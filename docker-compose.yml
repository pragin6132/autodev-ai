version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: autodev_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autodev_db}
      POSTGRES_USER: ${POSTGRES_USER:-autodev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autodev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autodev_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: autodev_backend
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=postgresql://${POSTGRES_USER:-autodev}:${POSTGRES_PASSWORD:-autodev_password}@database:5432/${POSTGRES_DB:-autodev_db}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - autodev_network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: autodev_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - autodev_network

volumes:
  postgres_data:

networks:
  autodev_network:
    driver: bridge
